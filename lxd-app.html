<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>oh. lxd app</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,500;0,600;0,700;0,800;1,500&display=swap" rel="stylesheet">
<style>
/* ========== RESET ========== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: 'Nunito', 'Avenir Next Rounded Std', system-ui, sans-serif;
  background: var(--oh-cream);
  color: var(--oh-ink);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  -webkit-tap-highlight-color: transparent;
}
button { font-family: inherit; border: none; background: none; cursor: pointer; -webkit-appearance: none; }
input { font-family: inherit; }

/* ========== TOKENS ========== */
:root {
  --oh-orange: #F25E35;
  --oh-cream: #F9F2E8;
  --oh-ink: #2C2B28;
  --oh-white: #FFFFFF;

  --cat-language: #A3C996;
  --cat-music: #7DBBE2;
  --cat-movement: #EDAAB0;
  --cat-art: #F3C520;

  --oh-ink-soft: #6B6B6B;
  --oh-ink-faint: #A5A29B;

  --oh-cream-dark: #F2EADA;
  --oh-rule: #E8DFC8;

  --oh-orange-light: #F5C097;
  --oh-orange-pale: #FDF0E8;
  --oh-yellow-pale: #FEF8E3;

  --prog-speaking: #A3C996;

  --seg-rollcall: #F25E35;
  --seg-playground: #A3C996;
  --seg-showtime: #8B5EA8;
  --seg-signoff: #7DBBE2;
  --seg-logbook: #A5A29B;

  --space-1: 4px; --space-2: 8px; --space-3: 12px; --space-4: 16px;
  --space-5: 20px; --space-6: 24px; --space-8: 32px; --space-10: 40px;

  --radius-sm: 8px; --radius-md: 12px; --radius-lg: 16px;
  --radius-xl: 24px; --radius-full: 9999px;

  --text-xs: 11px; --text-sm: 13px; --text-base: 15px;
  --text-md: 17px; --text-lg: 20px; --text-xl: 24px;
  --text-2xl: 28px; --text-3xl: 34px;

  --weight-regular: 400; --weight-medium: 500;
  --weight-semibold: 600; --weight-bold: 700; --weight-extrabold: 800;

  --shadow-card: 0 1px 2px rgba(44,43,40,0.04), 0 4px 12px rgba(44,43,40,0.04);
  --shadow-card-hover: 0 4px 16px rgba(44,43,40,0.08);
  --shadow-sheet: 0 -2px 20px rgba(44,43,40,0.12);

  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  --duration-fast: 150ms;
  --duration-base: 220ms;

  --tab-h: 60px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

/* ========== APP SHELL ========== */
.app-shell {
  display: flex;
  flex-direction: column;
  height: 100vh;
  height: 100dvh;
  max-width: 480px;
  margin: 0 auto;
  position: relative;
  overflow: hidden;
}
@media (min-width: 640px) { .app-shell { max-width: 640px; } }
@media (min-width: 1024px) { .app-shell { max-width: 1024px; } }

/* ========== SCREEN ========== */
.screen {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  padding: 0 var(--space-4);
  padding-bottom: calc(var(--tab-h) + var(--safe-bottom) + var(--space-4));
}
.screen--hidden { display: none; }
@media (min-width: 640px) { .screen { padding-left: var(--space-6); padding-right: var(--space-6); } }

/* ========== TAB BAR ========== */
.tab-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  width: 100%;
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  background: var(--oh-white);
  border-top: 1px solid var(--oh-rule);
  padding-bottom: var(--safe-bottom);
  z-index: 100;
}
.tab-bar__item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  padding: var(--space-2) 0;
  color: var(--oh-ink-faint);
  font-size: var(--text-xs);
  font-weight: var(--weight-medium);
  text-transform: lowercase;
  transition: color var(--duration-fast);
  min-height: 52px;
  justify-content: center;
}
.tab-bar__item--active { color: var(--oh-orange); }
.tab-bar__item svg { width: 24px; height: 24px; }
.tab-bar__item--active svg { stroke: var(--oh-orange); }

/* ========== HEADINGS ========== */
h1, h2, h3, h4 { text-transform: lowercase; }
.page-title {
  font-size: var(--text-xl);
  font-weight: var(--weight-bold);
  color: var(--oh-ink);
  margin: var(--space-6) 0 var(--space-4);
}

/* ========== HEADER BAR ========== */
.header-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--space-4) 0;
  margin-bottom: var(--space-4);
}
.header-bar__logo {
  height: 28px;
  width: auto;
  flex-shrink: 0;
}
.header-bar__tagline {
  font-size: var(--text-xs);
  font-weight: var(--weight-medium);
  font-style: italic;
  color: var(--oh-ink);
  text-align: right;
  line-height: 1.3;
}
.header-bar__sub {
  font-size: var(--text-xs);
  font-weight: var(--weight-medium);
  font-style: italic;
  color: var(--oh-ink-faint);
  text-align: right;
  margin-top: 2px;
}

/* ========== AGE CAPSULES (top-level filter) ========== */
.age-capsules {
  display: flex;
  gap: var(--space-2);
  margin: 0 calc(-1 * var(--space-4)) var(--space-4);
  padding: 0 var(--space-4);
  overflow-x: auto;
  -ms-overflow-style: none;
  scrollbar-width: none;
}
.age-capsules::-webkit-scrollbar { display: none; }
.age-capsule {
  flex: 1;
  min-width: 0;
  padding: var(--space-3) var(--space-4);
  border-radius: var(--radius-full);
  font-size: var(--text-sm);
  font-weight: var(--weight-semibold);
  color: var(--oh-ink-soft);
  background: var(--oh-cream-dark);
  transition: all var(--duration-fast);
  min-height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  text-transform: lowercase;
  white-space: nowrap;
}
.age-capsule--active {
  background: var(--oh-orange);
  color: var(--oh-white);
  font-weight: var(--weight-bold);
}
.age-capsule:active { transform: scale(0.97); }

/* ========== CATEGORY CHIPS (colour-coded filter) ========== */
.cat-chips-wrap { margin-bottom: var(--space-4); }
.cat-chips {
  display: flex;
  gap: var(--space-2);
  overflow-x: auto;
  padding-bottom: var(--space-2);
  -ms-overflow-style: none;
  scrollbar-width: none;
}
.cat-chips::-webkit-scrollbar { display: none; }
.cat-chip {
  padding: var(--space-2) var(--space-4);
  border-radius: var(--radius-full);
  font-size: var(--text-sm);
  font-weight: var(--weight-semibold);
  border: 2px solid var(--chip-color);
  color: var(--chip-color);
  background: var(--oh-white);
  transition: all var(--duration-fast);
  min-height: 40px;
  display: flex;
  align-items: center;
  white-space: nowrap;
  text-transform: lowercase;
}
.cat-chip--active {
  background: var(--chip-color);
  color: var(--oh-white);
}
.cat-chip:active { transform: scale(0.97); }
.cat-skills {
  font-size: var(--text-xs);
  color: var(--oh-ink-faint);
  font-style: italic;
  padding: var(--space-1) 0 0;
}

/* ========== PROGRAMME LIST ITEMS ========== */
.prog-list { margin-bottom: var(--space-4); }
.prog-item {
  display: flex;
  align-items: center;
  background: var(--oh-white);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-card);
  padding: var(--space-4);
  margin-bottom: var(--space-3);
  position: relative;
  overflow: hidden;
  min-height: 64px;
  transition: box-shadow var(--duration-base) var(--ease-out);
  border: 2px solid transparent;
}
.prog-item::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 5px;
  background: var(--accent);
}
.prog-item:active { transform: scale(0.985); }
.prog-item--selected {
  border-color: var(--oh-orange);
  background: var(--oh-orange-pale);
}
.prog-item__body { flex: 1; padding-left: var(--space-3); }
.prog-item__name {
  font-size: var(--text-md);
  font-weight: var(--weight-bold);
  color: var(--oh-ink);
  text-transform: lowercase;
}
.prog-item__desc {
  font-size: var(--text-sm);
  color: var(--oh-ink-soft);
  margin-top: 2px;
}
.prog-item__check {
  width: 22px; height: 22px;
  background: var(--oh-orange);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.prog-item__check svg { width: 12px; height: 12px; stroke: white; fill: none; stroke-width: 3; }

/* ========== AGE PILLS (for post-selection age choice) ========== */
.age-row {
  display: flex;
  gap: var(--space-2);
  margin: var(--space-3) 0 var(--space-5);
  padding-left: var(--space-1);
}
.age-pill {
  padding: var(--space-2) var(--space-5);
  border-radius: var(--radius-full);
  font-size: var(--text-sm);
  font-weight: var(--weight-semibold);
  border: 1.5px solid var(--oh-ink);
  color: var(--oh-ink-soft);
  background: var(--oh-white);
  transition: all var(--duration-fast);
  min-height: 44px;
  display: flex;
  align-items: center;
  text-transform: lowercase;
}
.age-pill--active {
  background: var(--oh-orange);
  border-color: var(--oh-orange);
  color: var(--oh-white);
}

/* ========== PROGRAMME AT A GLANCE ========== */
.glance-card {
  background: var(--oh-white);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-card);
  overflow: hidden;
  margin-bottom: var(--space-4);
}
.glance-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--space-4);
  cursor: pointer;
  min-height: 52px;
}
.glance-header:active { background: var(--oh-cream); }
.glance-header__left {
  display: flex;
  align-items: center;
  gap: var(--space-2);
}
.glance-header__title {
  font-size: var(--text-md);
  font-weight: var(--weight-semibold);
  text-transform: lowercase;
}
.glance-header__age {
  font-size: var(--text-xs);
  color: var(--oh-ink-faint);
  background: var(--oh-cream);
  padding: 2px 8px;
  border-radius: var(--radius-full);
}
.glance-header__chevron {
  width: 20px; height: 20px;
  color: var(--oh-ink-faint);
  transition: transform var(--duration-base) var(--ease-out);
}
.glance-header__chevron--open { transform: rotate(180deg); }
.glance-body { padding: 0 var(--space-4) var(--space-4); }
.glance-section { margin-bottom: var(--space-5); }
.glance-section__title {
  font-size: var(--text-sm);
  font-weight: var(--weight-semibold);
  color: var(--oh-ink);
  text-transform: lowercase;
  margin-bottom: var(--space-3);
}
.skill-row {
  display: flex;
  align-items: flex-start;
  gap: var(--space-3);
  margin-bottom: var(--space-3);
}
.skill-tag {
  font-size: var(--text-xs);
  font-weight: var(--weight-semibold);
  color: var(--oh-white);
  background: var(--oh-orange);
  padding: 3px 10px;
  border-radius: var(--radius-full);
  white-space: nowrap;
  flex-shrink: 0;
}
.skill-desc {
  font-size: var(--text-sm);
  color: var(--oh-ink-soft);
  line-height: 1.4;
}
.daily-table { width: 100%; border-collapse: collapse; }
.daily-table th {
  text-align: left;
  font-size: var(--text-xs);
  font-weight: var(--weight-semibold);
  color: var(--oh-ink-faint);
  padding: var(--space-2) var(--space-2);
  border-bottom: 1px solid var(--oh-rule);
  text-transform: lowercase;
}
.daily-table td {
  font-size: var(--text-sm);
  color: var(--oh-ink);
  padding: var(--space-2) var(--space-2);
  border-bottom: 1px solid var(--oh-rule);
  vertical-align: top;
}
.daily-table tr:last-child td { border-bottom: none; }
.daily-table td:first-child { font-weight: var(--weight-medium); white-space: nowrap; }
.daily-table td:nth-child(2) { color: var(--oh-ink-faint); white-space: nowrap; }
.milestone-nudge {
  background: var(--oh-orange-pale);
  border-left: 3px solid var(--oh-orange);
  padding: var(--space-3) var(--space-4);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  font-size: var(--text-sm);
  color: var(--oh-ink-soft);
  line-height: 1.4;
}

/* ========== SESSION COUNTER ========== */
.session-counter {
  display: flex;
  align-items: center;
  gap: var(--space-4);
  margin-bottom: var(--space-5);
}
.session-counter__label {
  font-size: var(--text-base);
  color: var(--oh-ink-soft);
  text-transform: lowercase;
}
.session-counter__stepper {
  display: flex;
  align-items: center;
  gap: 0;
  background: var(--oh-white);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-card);
  overflow: hidden;
}
.stepper-btn {
  width: 44px; height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: var(--text-lg);
  font-weight: var(--weight-bold);
  color: var(--oh-ink);
  background: var(--oh-white);
  transition: background var(--duration-fast);
}
.stepper-btn:active { background: var(--oh-cream); }
.stepper-btn:disabled { color: var(--oh-ink-faint); opacity: 0.4; }
.stepper-val {
  min-width: 48px;
  text-align: center;
  font-size: var(--text-lg);
  font-weight: var(--weight-extrabold);
  color: var(--oh-ink);
  padding: 0 var(--space-2);
  border-left: 1px solid var(--oh-rule);
  border-right: 1px solid var(--oh-rule);
  line-height: 44px;
}

/* ========== GO TO PLAN BUTTON ========== */
.go-plan-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  min-height: 52px;
  background: var(--oh-orange);
  color: var(--oh-white);
  border-radius: var(--radius-md);
  font-size: var(--text-md);
  font-weight: var(--weight-bold);
  text-transform: lowercase;
  transition: transform var(--duration-fast), opacity var(--duration-fast);
  margin-bottom: var(--space-4);
}
.go-plan-btn:active { transform: scale(0.985); }
.go-plan-btn:disabled { opacity: 0.5; }

/* ========== PLAN SCREEN ========== */
.plan-header { margin: var(--space-6) 0 var(--space-4); }
.plan-header__top {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  margin-bottom: var(--space-2);
}
.plan-header__prog {
  font-size: var(--text-sm);
  font-weight: var(--weight-semibold);
  color: var(--prog-speaking);
  text-transform: lowercase;
}
.plan-header__age {
  font-size: var(--text-xs);
  color: var(--oh-ink-faint);
  background: var(--oh-cream-dark);
  padding: 2px 8px;
  border-radius: var(--radius-full);
}
.plan-header__session {
  font-size: var(--text-2xl);
  font-weight: var(--weight-extrabold);
  text-transform: lowercase;
}
.plan-progress {
  width: 100%;
  height: 4px;
  background: var(--oh-cream-dark);
  border-radius: 2px;
  margin-top: var(--space-2);
  overflow: hidden;
}
.plan-progress__fill {
  height: 100%;
  background: var(--prog-speaking);
  border-radius: 2px;
  transition: width var(--duration-base) var(--ease-out);
}

/* ========== NUDGE BANNER ========== */
.nudge-banner {
  display: flex;
  align-items: flex-start;
  gap: var(--space-3);
  background: var(--oh-yellow-pale);
  border-left: 3px solid var(--cat-art);
  padding: var(--space-3) var(--space-4);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  margin-bottom: var(--space-4);
  font-size: var(--text-sm);
  color: var(--oh-ink-soft);
  line-height: 1.4;
}
.nudge-banner__text { flex: 1; }
.nudge-banner__close {
  flex-shrink: 0;
  width: 28px; height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--oh-ink-faint);
  font-size: var(--text-md);
  border-radius: 50%;
}
.nudge-banner__close:active { background: rgba(0,0,0,0.05); }

/* ========== SEGMENT CARDS ========== */
.seg-card {
  background: var(--oh-white);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-card);
  padding: var(--space-3) var(--space-4);
  margin-bottom: var(--space-3);
  position: relative;
  overflow: hidden;
  min-height: 68px;
  display: flex;
  align-items: center;
  transition: transform var(--duration-fast);
}
.seg-card:active { transform: scale(0.985); }
.seg-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 4px;
  background: var(--oh-orange);
}
.seg-card__body { flex: 1; padding-left: var(--space-3); }
.seg-card__name {
  font-size: var(--text-sm);
  font-weight: var(--weight-semibold);
  text-transform: lowercase;
  color: var(--oh-ink);
}
.seg-card__time {
  font-size: var(--text-xs);
  color: var(--oh-ink-faint);
}
.seg-card__activity {
  font-size: var(--text-base);
  color: var(--oh-ink-soft);
  margin-top: 2px;
}
.seg-card__chevron {
  width: 20px; height: 20px;
  color: var(--oh-ink-faint);
  flex-shrink: 0;
}

/* ========== BOTTOM SHEET ========== */
.sheet-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(44,43,40,0.4);
  z-index: 200;
  opacity: 0;
  transition: opacity var(--duration-base);
  pointer-events: none;
}
.sheet-backdrop--open { opacity: 1; pointer-events: auto; }
.sheet-panel {
  position: fixed;
  inset: 0;
  transform: translateY(100%);
  width: 100%;
  height: 100%;
  background: var(--oh-white);
  z-index: 201;
  display: flex;
  flex-direction: column;
  transition: transform 300ms var(--ease-out);
}
.sheet-panel--open { transform: translateY(0); }
.sheet-handle {
  width: 36px; height: 4px;
  background: var(--oh-rule);
  border-radius: 2px;
  margin: var(--space-3) auto var(--space-2);
  flex-shrink: 0;
}
.sheet-accent {
  width: 100%;
  height: 6px;
  flex-shrink: 0;
}
.sheet-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  padding: var(--space-3) var(--space-4) 0;
  flex-shrink: 0;
}
.sheet-header__left { flex: 1; }
.sheet-seg-label {
  font-size: var(--text-sm);
  font-weight: var(--weight-medium);
  text-transform: lowercase;
}
.sheet-title {
  font-size: var(--text-xl);
  font-weight: var(--weight-bold);
  color: var(--oh-ink);
  text-transform: lowercase;
  margin-top: 2px;
}
.sheet-time-badge {
  display: inline-block;
  font-size: var(--text-xs);
  color: var(--oh-ink-soft);
  background: var(--oh-cream-dark);
  padding: 2px 10px;
  border-radius: var(--radius-full);
  margin-top: var(--space-2);
}
.sheet-close {
  width: 36px; height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  color: var(--oh-ink-faint);
  font-size: var(--text-lg);
  flex-shrink: 0;
}
.sheet-close:active { background: var(--oh-cream); }
.sheet-body {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: var(--space-4);
}

/* ========== SETUP LINE ========== */
.setup-box {
  background: var(--oh-orange-pale);
  border-left: 3px solid var(--oh-orange);
  padding: var(--space-3) var(--space-4);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  margin-bottom: var(--space-4);
}
.setup-box__label {
  font-size: var(--text-xs);
  text-transform: uppercase;
  color: var(--oh-ink-faint);
  letter-spacing: 0.5px;
  margin-bottom: var(--space-1);
}
.setup-box__text {
  font-size: var(--text-md);
  font-style: italic;
  color: var(--oh-ink);
  line-height: 1.4;
}

/* ========== ACCORDION ========== */
.accordion { margin-bottom: var(--space-3); }
.accordion__trigger {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  padding: var(--space-3) 0;
  border-bottom: 1px solid var(--oh-rule);

function getTodayRotation(sessionNumber) {
  const s = sessionNumber - 1;
  const showtimePool = sessionNumber >= 25
    ? [ROTATIONS.showtime[0], ROTATIONS.showtime[1], ROTATIONS.showtime[2], ROTATIONS.showtime[3], 'superhero-sales']
    : ROTATIONS.showtime;
  return {
    rollCall: ROTATIONS.rollCall[s % 5],
    playground: ROTATIONS.playground[s % 9],
    showtime: showtimePool[s % showtimePool.length],
    signOff: ROTATIONS.signOff[s % 4],
    topicLayer: sessionNumber <= 12 ? 1 : sessionNumber <= 24 ? 2 : sessionNumber <= 36 ? 3 : 4,
  };
}

function getActivityById(id) {
  return ALL_RESOURCES.find(r => r.id === id);

function useLocalStorage(key, defaultVal) {
  const [val, setVal] = useState(() => {
    try {
      const stored = localStorage.getItem(key);
      return stored !== null ? JSON.parse(stored) : defaultVal;
    } catch { return defaultVal; }
  });
  useEffect(() => {
    try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
  }, [key, val]);
  return [val, setVal];
}

// ---------- BOTTOM SHEET ----------
function BottomSheet({ open, onClose, accentColor, segLabel, title, timeBadge, children }) {
  const panelRef = useRef(null);
  const startY = useRef(0);
  const currentY = useRef(0);

  useEffect(() => {
    if (open) {
      document.body.style.overflow = 'hidden';
    } else {
      document.body.style.overflow = '';
    }
    return () => { document.body.style.overflow = ''; };
  }, [open]);

  const handleTouchStart = (e) => { startY.current = e.touches[0].clientY; };
  const handleTouchMove = (e) => {
    currentY.current = e.touches[0].clientY;
    const diff = currentY.current - startY.current;
    if (diff > 0 && panelRef.current) {
      panelRef.current.style.transform = `translateX(-50%) translateY(${diff}px)`;
      panelRef.current.style.transition = 'none';
    }
  };
  const handleTouchEnd = () => {
    const diff = currentY.current - startY.current;
    if (panelRef.current) {
      panelRef.current.style.transition = '';
      panelRef.current.style.transform = '';
    }
    if (diff > 100) onClose();
    startY.current = 0;
    currentY.current = 0;
  };

  return ReactDOM.createPortal(
    <>
      <div className={`sheet-backdrop ${open ? 'sheet-backdrop--open' : ''}`} onClick={onClose} />
      <div ref={panelRef} className={`sheet-panel ${open ? 'sheet-panel--open' : ''}`}>
        <div
          className="sheet-handle"
          onTouchStart={handleTouchStart}
          onTouchMove={handleTouchMove}
          onTouchEnd={handleTouchEnd}
        />
        <div className="sheet-accent" style={{ background: accentColor }} />
        <div className="sheet-header">
          <div className="sheet-header__left">
            {segLabel && <div className="sheet-seg-label" style={{ color: 'var(--oh-ink)' }}>{segLabel}</div>}
            <h2 className="sheet-title">{title}</h2>
            {timeBadge && <span className="sheet-time-badge">{timeBadge}</span>}
          </div>
          <button className="sheet-close" onClick={onClose} aria-label="Close">&times;</button>
        </div>
        <div className="sheet-body">{children}</div>
      </div>
    </>,
    document.body
  );
}

function HomeScreen({ programme, age, session, onChangeProgramme, onChangeAge, onChangeSession, onGoToPlan }) {

  // When age capsule changes, auto-set age for selected programme if applicable
  const handleAgeFilter = (a) => {
    setAgeFilter(a);
    if (a && programme) {
      const p = PROGRAMMES.find(pr => pr.id === programme);
      if (p && p.ages.includes(a)) {

  const handleSelectProgramme = (id) => {
    onChangeProgramme(id);
    const p = PROGRAMMES.find(pr => pr.id === id);
    if (p && ageFilter && p.ages.includes(ageFilter)) {
      onChangeAge(ageFilter);
    } else if (p && p.ages.length === 1) {
      onChangeAge(p.ages[0]);
    } else {

  };

  return (
    <div>

// ---------- CARD FLIPPER ----------
function CardFlipper({ cards }) {
  const [index, setIndex] = useState(0);
  const [order, setOrder] = useState(() => cards.map((_, i) => i));

  const shuffle = () => {
    const newOrder = [...order].sort(() => Math.random() - 0.5);
    setOrder(newOrder);
    setIndex(0);
  };

  const current = cards[order[index]];

  return (
    <div className="digi-resource">
      <div className="digi-resource__title">topic cards</div>
      <div className="flipper-card">
        <div className="flipper-card__text">{current}</div>
        <div className="flipper-card__count">{index + 1} / {cards.length}</div>
      </div>
      <div className="flipper-controls">
        <button className="flipper-btn" onClick={() => setIndex(Math.max(0, index - 1))} disabled={index === 0}>&larr;</button>
        <button className="flipper-btn flipper-btn--shuffle" onClick={shuffle}>shuffle</button>
        <button className="flipper-btn" onClick={() => setIndex(Math.min(cards.length - 1, index + 1))} disabled={index === cards.length - 1}>&rarr;</button>
      </div>
    </div>
  );
}

        <button
          className="signoff-next-btn"
          onClick={() => setIndex((index + 1) % topics.length)}
        >next topic</button>
      </div>
      <div style={{ fontSize: 'var(--text-xs)', color: 'var(--oh-ink-faint)', marginTop: 'var(--space-2)', textAlign: 'center' }}>
        layer {topicLayer} &middot; {topics.length} topics
      </div>
    </div>
  );
}

// ---------- LOG BOOK PREVIEW ----------
function LogBookPreview() {
  return (
    <div className="digi-resource">
      <div className="digi-resource__title">log book page</div>
      <div className="logbook-preview">
        <div className="logbook-note">{LOG_BOOK.note}</div>
        {LOG_BOOK.prompts.map((p, i) => (
          <div className="logbook-prompt" key={i}>
            <div className="logbook-prompt__label">{p.label}</div>
            <div className="logbook-prompt__lines" style={{ whiteSpace: 'pre-line' }}>{p.lines}</div>
          </div>
        ))}
        <div className="logbook-draw-box">{LOG_BOOK.drawPrompt}</div>
      </div>
    </div>
  );
}

// ============================================================
// SECTION H: ACTIVITY DETAIL (rendered inside BottomSheet)
// ============================================================

function ActivityDetail({ activity, segment, topicLayer }) {
  const [diffLevel, setDiffLevel] = useState(null);

  if (!activity) return null;

  // Log Book special case
  if (activity.id === 'log-book') {
    return <LogBookPreview />;
  }

  return (
    <div>
      {/* Setup line */}
      {activity.setup && (
        <div className="setup-box">
          <div className="setup-box__label">Say this to begin:</div>
          <div className="setup-box__text">{activity.setup}</div>
        </div>
      )}

      {/* How to play */}
      {activity.howToPlay && (
        <Accordion title="how to play" defaultOpen={true}>
          <p>{activity.howToPlay}</p>
        </Accordion>
      )}

      {/* Variations */}
      {activity.variations && activity.variations.length > 0 && (
        <Accordion title="variations">
          <ul>
            {activity.variations.map((v, i) => <li key={i}>{v}</li>)}
          </ul>
        </Accordion>
      )}

      {/* Difficulty */}
      {activity.difficulty && (
        <Accordion title="difficulty">
          <div className="diff-row">
            {['easy', 'medium', 'hard'].map(d => (
              <button
                key={d}
                className={`diff-pill ${diffLevel === d ? 'diff-pill--active' : ''}`}
                onClick={() => setDiffLevel(diffLevel === d ? null : d)}
              >{d}</button>
            ))}
          </div>
          {diffLevel && activity.difficulty[diffLevel] && (
            <p>{activity.difficulty[diffLevel]}</p>
          )}
        </Accordion>
      )}

      {/* Scaffold (Sign-Off) */}
      {activity.scaffold && (
        <Accordion title="scaffold prompts" defaultOpen={true}>
          <ul>
            {activity.scaffold.map((s, i) => <li key={i}>{s}</li>)}
          </ul>
        </Accordion>
      )}

      {/* Debrief */}
      {activity.debrief && activity.debrief.length > 0 && (
        <Accordion title="debrief prompts">
          {activity.debrief.map((d, i) => (
            <div className="debrief-item" key={i}>
              <div className="debrief-label">{d.type}</div>
              {d.prompt}
            </div>
          ))}
        </Accordion>
      )}

      {/* Digital Resources - inline */}
      {activity.digitalResources && activity.digitalResources.map((dr, i) => {
        switch (dr.type) {
          case 'card-flipper':
            const cards = activity.topics || ['Topic 1', 'Topic 2', 'Topic 3'];
            return <CardFlipper key={i} cards={cards} />;
          case 'tone-prompt':
            return <TonePromptDisplay key={i} tones={TONE_CARDS} />;
          case 'music-player':
            return <MusicPlayer key={i} tracks={MUSIC_TRACKS} />;
          case 'signoff-topic':
            return <SignOffTopicDisplay key={i} formatId={activity.id} topicLayer={topicLayer || 1} />;
          case 'voice-alteration':
            return <VoiceAlterationPrompt key={i} />;
          case 'log-preview':
            return <LogBookPreview key={i} />;
          default:
            return null;
        }
      })}
    </div>
  );
}

// ============================================================
// SECTION I: LIBRARY SCREEN
// ============================================================

function LibraryScreen({ onOpenSheet, topicLayer }) {
  const [query, setQuery] = useState('');
  const [filter, setFilter] = useState('all');
  const timerRef = useRef(null);
  const [debouncedQuery, setDebouncedQuery] = useState('');

  const handleSearch = (val) => {
    setQuery(val);
    if (timerRef.current) clearTimeout(timerRef.current);
    timerRef.current = setTimeout(() => setDebouncedQuery(val), 150);
  };

  const FILTER_CHIPS = [
    { id: 'all', label: 'all' },
    { id: 'rollcall', label: 'roll call' },
    { id: 'playground', label: 'playground' },
    { id: 'showtime', label: 'showtime' },
    { id: 'signoff', label: 'sign-off' },
    { id: 'physical', label: 'physical' },
    { id: 'digital', label: 'digital' },
  ];

  const filtered = useMemo(() => {
    return ALL_RESOURCES.filter(r => {
      // Segment filter
      if (filter !== 'all') {
        if (filter === 'physical' && r.resourceType !== 'physical') return false;
        if (filter === 'digital' && r.resourceType !== 'digital') return false;
        if (!['physical', 'digital'].includes(filter) && r.segment !== filter) return false;
      }
      // Search query
      if (debouncedQuery) {
        const q = debouncedQuery.toLowerCase();
        const searchStr = `${r.name} ${r.howToPlay || ''} ${r.setup || ''} ${r.segment}`.toLowerCase();
        if (!searchStr.includes(q)) return false;
      }
      return true;
    });
  }, [filter, debouncedQuery]);

  // Group by segment for default display
  const grouped = useMemo(() => {
    if (debouncedQuery || (filter !== 'all' && !['physical', 'digital'].includes(filter))) return null;
    const groups = {};
    filtered.forEach(r => {
      const seg = r.segment || 'reference';
      if (!groups[seg]) groups[seg] = [];
      groups[seg].push(r);
    });
    return groups;
  }, [filtered, debouncedQuery, filter]);

  const segColorMap = { rollcall: 'var(--oh-orange)', playground: 'var(--oh-orange)', showtime: 'var(--oh-orange)', signoff: 'var(--oh-orange)', logbook: 'var(--oh-ink)' };
  const segNameMap = { rollcall: 'roll call', playground: 'playground', showtime: 'showtime', signoff: 'sign-off', logbook: 'log book' };

  const renderCard = (r) => {
    const seg = SEGMENTS.find(s => s.id === r.segment);
    return (
      <button
        key={r.id}
        className="res-card"
        onClick={() => onOpenSheet(r, seg, topicLayer)}
      >
        <div className="res-card__body">
          <div className="res-card__tags">
            <span className="res-card__seg-tag" style={{ background: segColorMap[r.segment] || 'var(--oh-ink-faint)' }}>
              {segNameMap[r.segment] || r.segment}
            </span>
            <span className={`res-card__type-tag res-card__type-tag--${r.resourceType}`}>
              {r.resourceType}
            </span>
          </div>
          <div className="res-card__name">{r.name}</div>
          {r.howToPlay && <div className="res-card__desc">{r.howToPlay.slice(0, 100)}...</div>}
        </div>
      </button>
    );
  };

  return (
    <div>
      <div className="search-bar">
        <div className="search-input-wrap">
          <span className="search-input-wrap__icon">&#128269;</span>
          <input
            className="search-input"
            type="text"
            placeholder="Search resources, games, topics..."
            value={query}
            onChange={e => handleSearch(e.target.value)}
          />
        </div>
      </div>

      <div className="filter-row">
        {FILTER_CHIPS.map(c => (
          <button
            key={c.id}
            className={`filter-chip ${filter === c.id ? 'filter-chip--active' : ''}`}
            onClick={() => setFilter(c.id)}
          >{c.label}</button>
        ))}
      </div>

      {filtered.length === 0 && (
        <div className="empty-state">No resources match your search. Try a different term or clear filters.</div>
      )}

      {grouped ? (
        Object.entries(grouped).map(([seg, resources]) => (
          <div key={seg}>
            <div className="lib-section-title">{segNameMap[seg] || seg} ({resources.length})</div>
            {resources.map(renderCard)}
          </div>
        ))
      ) : (
        filtered.map(renderCard)
      )}
    </div>
  );
}

// ============================================================
// SECTION J: APP SHELL
// ============================================================

function App() {
  const [tab, setTab] = useState('home');
  const [programme, setProgramme] = useLocalStorage('oh-programme', '');
  const [age, setAge] = useLocalStorage('oh-age', '');
  const [session, setSession] = useLocalStorage('oh-session', 1);
  const [dismissed, setDismissed] = useLocalStorage('oh-dismissed', {});

  // Sheet state
  const [sheetOpen, setSheetOpen] = useState(false);
  const [sheetData, setSheetData] = useState(null);

  const openSheet = (activity, segment, topicLayer) => {
    setSheetData({ activity, segment, topicLayer });
    setSheetOpen(true);
  };
  const closeSheet = () => setSheetOpen(false);

  const handleDismissNudge = (sessionNum) => {
    setDismissed({ ...dismissed, [sessionNum]: true });
  };

  const goToPlan = () => setTab('plan');

  const handleChangeProgramme = (id) => {
    setProgramme(id);
    setAge('');
  };

  const rotation = useMemo(() => getTodayRotation(session), [session]);

  return (
    <div className="app-shell">
      {/* HOME */}
      <div className={`screen ${tab !== 'home' ? 'screen--hidden' : ''}`}>
        <HomeScreen
          programme={programme}
          age={age}
          session={session}
          onChangeProgramme={handleChangeProgramme}
          onChangeAge={setAge}
          onChangeSession={setSession}
          onGoToPlan={goToPlan}
        />
      </div>

      {/* PLAN */}
      <div className={`screen ${tab !== 'plan' ? 'screen--hidden' : ''}`}>
        <PlanScreen
          programme={programme}
          age={age}
          session={session}
          dismissed={dismissed}
          onDismiss={handleDismissNudge}
          onOpenSheet={openSheet}
        />
      </div>

      {/* LIBRARY */}
      <div className={`screen ${tab !== 'library' ? 'screen--hidden' : ''}`}>
        <LibraryScreen onOpenSheet={openSheet} topicLayer={rotation.topicLayer} />
      </div>

      {/* BOTTOM TAB BAR */}
      <BottomTabBar active={tab} onChange={setTab} />

      {/* BOTTOM SHEET */}
      {sheetData && (
        <BottomSheet
          open={sheetOpen}
          onClose={closeSheet}
          accentColor={'var(--oh-orange)'}
          segLabel={sheetData.segment ? sheetData.segment.name : ''}
          title={sheetData.activity ? sheetData.activity.name : ''}
          timeBadge={sheetData.segment ? sheetData.segment.time : ''}
        >
          <ActivityDetail
            activity={sheetData.activity}
            segment={sheetData.segment}
            topicLayer={sheetData.topicLayer}
          />
        </BottomSheet>
      )}
    </div>
  );
}

// Mount
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
